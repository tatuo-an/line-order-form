<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>注文フォーム</title>
  <style>
    :root {
      --green: #06C755;
      --green-dark: #05a846;
      --bg: #f0f2f5;
      --card: #ffffff;
      --text: #1a1a1a;
      --sub: #666;
      --border: #e0e0e0;
      --error: #e53935;
      --radius: 12px;
    }

    * { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }

    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Hiragino Kaku Gothic ProN', 'Noto Sans JP', sans-serif;
      background: var(--bg);
      color: var(--text);
      min-height: 100vh;
    }

    /* ===== ヘッダー ===== */
    .header {
      background: var(--green);
      color: white;
      padding: 16px 20px 12px;
      position: sticky;
      top: 0;
      z-index: 10;
    }
    .header h1 { font-size: 17px; font-weight: 700; }

    /* ===== ステップインジケーター ===== */
    .steps {
      display: flex;
      align-items: center;
      padding: 14px 20px;
      background: white;
      border-bottom: 1px solid var(--border);
      gap: 0;
    }
    .step {
      display: flex;
      align-items: center;
      gap: 6px;
      flex: 1;
    }
    .step-circle {
      width: 26px;
      height: 26px;
      border-radius: 50%;
      border: 2px solid var(--border);
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 12px;
      font-weight: 700;
      color: var(--sub);
      background: white;
      flex-shrink: 0;
      transition: all 0.2s;
    }
    .step-label { font-size: 11px; color: var(--sub); }
    .step-line { flex: 1; height: 2px; background: var(--border); margin: 0 4px; }
    .step.active .step-circle { background: var(--green); border-color: var(--green); color: white; }
    .step.active .step-label { color: var(--green); font-weight: 600; }
    .step.done .step-circle { background: var(--green); border-color: var(--green); color: white; }
    .step.done .step-line { background: var(--green); }

    /* ===== コンテンツ ===== */
    .content { padding: 20px 16px; max-width: 520px; margin: 0 auto; }

    /* ===== カード ===== */
    .card {
      background: var(--card);
      border-radius: var(--radius);
      padding: 20px;
      margin-bottom: 16px;
      box-shadow: 0 1px 4px rgba(0,0,0,0.08);
    }
    .card-title {
      font-size: 14px;
      font-weight: 700;
      color: var(--green-dark);
      margin-bottom: 16px;
      padding-bottom: 10px;
      border-bottom: 2px solid #e8f5e9;
    }

    /* ===== フォーム ===== */
    .form-group { margin-bottom: 16px; }
    .form-group:last-child { margin-bottom: 0; }

    label {
      display: block;
      font-size: 13px;
      font-weight: 600;
      margin-bottom: 6px;
      color: var(--text);
    }
    label .required {
      color: var(--error);
      margin-left: 3px;
      font-size: 11px;
    }

    input[type="text"],
    input[type="tel"],
    input[type="email"] {
      width: 100%;
      padding: 12px 14px;
      border: 1.5px solid var(--border);
      border-radius: 8px;
      font-size: 16px; /* 16px以上でiOSのズームを防ぐ */
      color: var(--text);
      background: #fafafa;
      transition: border-color 0.15s;
      -webkit-appearance: none;
    }
    input:focus {
      outline: none;
      border-color: var(--green);
      background: white;
    }
    input.error { border-color: var(--error); }
    .error-msg { font-size: 12px; color: var(--error); margin-top: 4px; }

    .postal-row { display: flex; gap: 8px; align-items: flex-start; }
    .postal-row input { flex: 1; }
    .postal-btn {
      padding: 12px 12px;
      background: #f0f0f0;
      border: 1.5px solid var(--border);
      border-radius: 8px;
      font-size: 13px;
      cursor: pointer;
      white-space: nowrap;
      color: var(--text);
      flex-shrink: 0;
    }
    .postal-btn:active { background: #e0e0e0; }

    /* ===== 商品選択 ===== */
    .product-list { display: flex; flex-direction: column; gap: 10px; }

    .product-item {
      border: 1.5px solid var(--border);
      border-radius: 10px;
      padding: 14px;
      display: flex;
      align-items: center;
      gap: 12px;
      transition: border-color 0.15s;
    }
    .product-item.selected { border-color: var(--green); background: #f0fbf4; }

    .product-info { flex: 1; }
    .product-name { font-size: 15px; font-weight: 600; }
    .product-price { font-size: 13px; color: var(--sub); margin-top: 2px; }

    .qty-control {
      display: flex;
      align-items: center;
      gap: 8px;
    }
    .qty-btn {
      width: 32px;
      height: 32px;
      border-radius: 50%;
      border: 1.5px solid var(--border);
      background: white;
      font-size: 18px;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      line-height: 1;
      transition: all 0.15s;
    }
    .qty-btn:active { background: #f0f0f0; }
    .qty-btn.plus { border-color: var(--green); color: var(--green); }
    .qty-num { font-size: 18px; font-weight: 700; min-width: 24px; text-align: center; }

    /* ===== 注文確認 ===== */
    .order-summary { display: flex; flex-direction: column; gap: 8px; }
    .order-row {
      display: flex;
      justify-content: space-between;
      font-size: 14px;
      padding: 6px 0;
    }
    .order-row + .order-row { border-top: 1px solid #f0f0f0; }
    .order-row.total {
      font-size: 16px;
      font-weight: 700;
      border-top: 2px solid var(--border) !important;
      padding-top: 12px;
      margin-top: 4px;
    }
    .user-info-summary { font-size: 13px; color: var(--sub); line-height: 1.7; }

    /* ===== ボタン ===== */
    .btn {
      display: block;
      width: 100%;
      padding: 15px;
      border-radius: 10px;
      border: none;
      font-size: 16px;
      font-weight: 700;
      cursor: pointer;
      transition: all 0.15s;
      text-align: center;
    }
    .btn-primary {
      background: var(--green);
      color: white;
    }
    .btn-primary:active { background: var(--green-dark); transform: scale(0.99); }
    .btn-primary:disabled { background: #b0b0b0; cursor: not-allowed; }
    .btn-secondary {
      background: white;
      color: var(--sub);
      border: 1.5px solid var(--border);
      margin-top: 10px;
    }
    .btn-secondary:active { background: #f5f5f5; }

    .btn-row { display: flex; flex-direction: column; gap: 0; margin-top: 20px; }

    /* ===== ローディング ===== */
    .loading {
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      padding: 80px 20px;
      gap: 16px;
    }
    .spinner {
      width: 40px;
      height: 40px;
      border: 3px solid #e0e0e0;
      border-top-color: var(--green);
      border-radius: 50%;
      animation: spin 0.8s linear infinite;
    }
    @keyframes spin { to { transform: rotate(360deg); } }
    .loading-text { font-size: 14px; color: var(--sub); }

    /* ===== エラー ===== */
    .alert {
      background: #fff3f3;
      border: 1px solid #ffcdd2;
      border-radius: 8px;
      padding: 12px 16px;
      font-size: 13px;
      color: var(--error);
      margin-bottom: 16px;
    }

    /* ===== 配達日時 ===== */
    input[type="date"] {
      width: 100%;
      padding: 12px 14px;
      border: 1.5px solid var(--border);
      border-radius: 8px;
      font-size: 16px;
      color: var(--text);
      background: #fafafa;
      -webkit-appearance: none;
    }
    input[type="date"]:focus { outline: none; border-color: var(--green); background: white; }

    .time-slots {
      display: grid;
      grid-template-columns: repeat(3, 1fr);
      gap: 8px;
    }
    .time-slot {
      padding: 10px 4px;
      border: 1.5px solid var(--border);
      border-radius: 8px;
      background: white;
      font-size: 13px;
      cursor: pointer;
      text-align: center;
      line-height: 1.4;
      transition: all 0.15s;
    }
    .time-slot.selected { border-color: var(--green); background: #f0fbf4; color: var(--green-dark); font-weight: 600; }
    .time-slot small { font-size: 11px; display: block; }

    /* グループヘッダー */
    .product-group-header {
      font-size: 14px; font-weight: 700; color: var(--green-dark);
      padding: 12px 4px; margin-top: 8px;
      border-bottom: 2px solid #e8f5e9;
      display: flex; justify-content: space-between; align-items: center;
      cursor: pointer; user-select: none;
    }
    .product-group-header:first-child { margin-top: 0; }
    .group-arrow { font-size: 12px; transition: transform 0.2s; }
    .product-group-header.closed .group-arrow { transform: rotate(-90deg); }
    .product-group-body { overflow: hidden; transition: max-height 0.25s ease; }
    .product-group-body.closed { max-height: 0 !important; }

    /* 在庫なし */
    .product-item.sold-out { opacity: 0.55; }
    .sold-out-badge { font-size: 11px; color: var(--error); font-weight: 600; margin-left: 4px; }

    /* スケジュール切替 */
    .schedule-toggle { display: flex; gap: 8px; margin-bottom: 16px; }
    .sch-btn {
      flex: 1; padding: 10px; border: 1.5px solid var(--border);
      border-radius: 8px; background: white; font-size: 14px; font-weight: 600; cursor: pointer;
      transition: all 0.15s;
    }
    .sch-btn.active { border-color: var(--green); background: #f0fbf4; color: var(--green-dark); }

    /* 曜日セレクター */
    .weekday-selector { display: flex; gap: 5px; }
    .wday-btn {
      flex: 1; padding: 9px 0; border: 1.5px solid var(--border);
      border-radius: 8px; background: white; font-size: 13px; font-weight: 600; cursor: pointer;
      transition: all 0.15s;
    }
    .wday-btn.selected { border-color: var(--green); background: #f0fbf4; color: var(--green-dark); }

    /* 配達日プレビュー */
    .date-chips { display: flex; flex-wrap: wrap; gap: 6px; margin-top: 8px; }
    .date-chip { background: #e8f5e9; border-radius: 20px; padding: 4px 12px; font-size: 12px; color: var(--green-dark); font-weight: 600; }
    .date-count { font-size: 13px; color: var(--sub); margin-top: 6px; }

    /* ===== 合計バー ===== */
    .total-bar {
      position: fixed;
      bottom: 0;
      left: 0;
      right: 0;
      background: white;
      border-top: 1px solid var(--border);
      padding: 12px 16px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      z-index: 10;
    }
    .total-bar-label { font-size: 13px; color: var(--sub); }
    .total-bar-amount { font-size: 20px; font-weight: 700; color: var(--text); }
    .total-bar-spacer { height: 70px; } /* ボタン分のスペース */

    /* ===== 非表示 ===== */
    [data-step] { display: none; }
    [data-step].active { display: block; }
  </style>
</head>
<body>

<div class="header">
  <h1 id="headerTitle">注文フォーム</h1>
</div>

<!-- ステップインジケーター（注文フォームと確認画面のみ表示） -->
<div class="steps" id="stepIndicator" style="display:none">
  <div class="step" id="si1">
    <div class="step-circle">1</div>
    <span class="step-label">お客様情報</span>
  </div>
  <div class="step-line"></div>
  <div class="step" id="si2">
    <div class="step-circle">2</div>
    <span class="step-label">商品選択</span>
  </div>
  <div class="step-line"></div>
  <div class="step" id="si3">
    <div class="step-circle">3</div>
    <span class="step-label">確認・決済</span>
  </div>
</div>

<div class="content">

  <!-- ローディング -->
  <div data-step="loading" class="active">
    <div class="loading">
      <div class="spinner"></div>
      <div class="loading-text">読み込み中...</div>
    </div>
  </div>

  <!-- Step 1: ユーザー登録 -->
  <div data-step="register">
    <div class="card">
      <div class="card-title">お客様情報の登録（初回のみ）</div>
      <div id="registerError" class="alert" style="display:none"></div>

      <div class="form-group">
        <label>お名前 <span class="required">*</span></label>
        <input type="text" id="r_name" placeholder="山田 太郎" autocomplete="name">
      </div>

      <div class="form-group">
        <label>郵便番号 <span class="required">*</span></label>
        <div class="postal-row">
          <input type="text" id="r_postal" placeholder="1234567" maxlength="7" inputmode="numeric">
          <button class="postal-btn" onclick="lookupPostal()">住所検索</button>
        </div>
      </div>

      <div class="form-group">
        <label>住所（都道府県〜番地）<span class="required">*</span></label>
        <input type="text" id="r_address" placeholder="東京都渋谷区〇〇1-2-3" autocomplete="street-address">
      </div>

      <div class="form-group">
        <label>建物名・部屋番号</label>
        <input type="text" id="r_address2" placeholder="〇〇マンション101号室">
      </div>

      <div class="form-group">
        <label>電話番号 <span class="required">*</span></label>
        <input type="tel" id="r_phone" placeholder="09012345678" inputmode="tel" autocomplete="tel">
      </div>

      <div class="form-group">
        <label>メールアドレス <span class="required">*</span></label>
        <input type="email" id="r_email" placeholder="example@email.com" inputmode="email" autocomplete="email">
      </div>
    </div>

    <div class="btn-row">
      <button class="btn btn-primary" onclick="submitRegistration()">次へ：商品を選ぶ</button>
    </div>
  </div>

  <!-- Step 2: 商品選択 -->
  <div data-step="order">
    <div class="card">
      <div class="card-title">商品を選んでください</div>
      <div id="productList" class="product-list">
        <div class="loading"><div class="spinner"></div></div>
      </div>
    </div>
    <div class="card">
      <div class="card-title">配達スケジュール</div>

      <div class="schedule-toggle">
        <button class="sch-btn active" id="btnSingle" onclick="setScheduleType('single')">一回のみ</button>
        <button class="sch-btn" id="btnRepeat" onclick="setScheduleType('repeat')">繰り返し</button>
      </div>

      <!-- 一回のみ -->
      <div id="singleSchedule">
        <div class="form-group">
          <label>配達希望日 <span class="required">*</span></label>
          <input type="date" id="deliveryDate">
        </div>
      </div>

      <!-- 繰り返し -->
      <div id="repeatSchedule" style="display:none">
        <div class="form-group">
          <label>開始日 <span class="required">*</span></label>
          <input type="date" id="repeatStart" onchange="updateDatePreview()">
        </div>
        <div class="form-group">
          <label>終了日 <span class="required">*</span></label>
          <input type="date" id="repeatEnd" onchange="updateDatePreview()">
        </div>
        <div class="form-group">
          <label>曜日 <span class="required">*</span></label>
          <div class="weekday-selector">
            <button class="wday-btn" data-day="1" onclick="toggleWeekday(this)">月</button>
            <button class="wday-btn" data-day="2" onclick="toggleWeekday(this)">火</button>
            <button class="wday-btn" data-day="3" onclick="toggleWeekday(this)">水</button>
            <button class="wday-btn" data-day="4" onclick="toggleWeekday(this)">木</button>
            <button class="wday-btn" data-day="5" onclick="toggleWeekday(this)">金</button>
            <button class="wday-btn" data-day="6" onclick="toggleWeekday(this)">土</button>
            <button class="wday-btn" data-day="0" onclick="toggleWeekday(this)">日</button>
          </div>
        </div>
        <div id="datePreview" style="display:none" class="form-group" style="margin-bottom:0">
          <label>配達予定日</label>
          <div id="datePreviewList" class="date-chips"></div>
          <div id="datePreviewCount" class="date-count"></div>
        </div>
      </div>

      <!-- 時間帯（共通） -->
      <div class="form-group" style="margin-bottom:0">
        <label>時間帯 <span class="required">*</span></label>
        <div class="time-slots">
          <button class="time-slot" onclick="selectTime(this,'午前中')">午前中<small>8〜12時</small></button>
          <button class="time-slot" onclick="selectTime(this,'12〜14時')">12〜14時</button>
          <button class="time-slot" onclick="selectTime(this,'14〜16時')">14〜16時</button>
          <button class="time-slot" onclick="selectTime(this,'16〜18時')">16〜18時</button>
          <button class="time-slot" onclick="selectTime(this,'18〜20時')">18〜20時</button>
          <button class="time-slot" onclick="selectTime(this,'19〜21時')">19〜21時</button>
        </div>
      </div>
    </div>
    <div class="total-bar-spacer"></div>
  </div>

  <!-- 合計バー（商品選択中に表示） -->
  <div class="total-bar" id="totalBar" style="display:none">
    <div>
      <div class="total-bar-label">合計金額</div>
      <div class="total-bar-amount" id="totalAmount">¥0</div>
    </div>
    <button class="btn btn-primary" style="width:auto;padding:12px 24px" onclick="goToConfirm()">注文確認へ</button>
  </div>

  <!-- Step 3: 注文確認 -->
  <div data-step="confirm">
    <div class="card">
      <div class="card-title">注文内容</div>
      <div id="orderSummary" class="order-summary"></div>
    </div>

    <div class="card">
      <div class="card-title">お届け先</div>
      <div id="userInfoSummary" class="user-info-summary"></div>
    </div>

    <div id="confirmError" class="alert" style="display:none"></div>

    <div class="btn-row">
      <button class="btn btn-primary" id="payBtn" onclick="submitOrder()">Stripeで決済する</button>
      <button class="btn btn-secondary" onclick="goBack()">← 商品選択に戻る</button>
    </div>
  </div>

</div><!-- /content -->

<script>
const API_URL = 'https://script.google.com/macros/s/AKfycbzqNwai3qwkGVBAaKOYGPgtVJQv9_16uYcfE7Rsg35dHM_J5wsEQsOXD6ohp9cWNtrh/exec';
const LIFF_ID = '2010168694-HkGwLgs9';

let lineProfile = null;
let userData = null;
let products = [];
let quantities = {};
let selectedTime = '';
let scheduleType = 'single';
let selectedWeekdays = [];
let deliveryDates = [];
let registrationPrefecture = '';
let currentShipping = 0;

// ===== 初期化 =====

function setLoadingText(msg) {
  document.querySelector('[data-step="loading"] .loading-text').textContent = msg;
}

async function init() {
  try {
    setLoadingText('① LIFF初期化中...');
    await Promise.race([
      liff.init({ liffId: LIFF_ID }),
      new Promise((_, reject) => setTimeout(() => reject(new Error('LIFF initタイムアウト。LIFF IDを確認してください: ' + LIFF_ID)), 8000)),
    ]);

    setLoadingText('② ログイン確認中...');
    if (!liff.isLoggedIn()) {
      liff.login({ redirectUri: location.href });
      return;
    }

    setLoadingText('③ プロフィール取得中...');
    lineProfile = await liff.getProfile();

    setLoadingText('④ ユーザー確認中...');
    const res = await api('checkUser', { lineId: lineProfile.userId });
    if (res.registered) {
      userData = res.user;
      userData.prefecture = extractPrefecture(res.user.address || '');
      await loadProducts();
      showStep('order');
    } else {
      showStep('register');
    }
  } catch (err) {
    document.querySelector('[data-step="loading"] .spinner').style.display = 'none';
    document.querySelector('[data-step="loading"] .loading-text').innerHTML =
      '<span style="color:red;font-weight:bold;word-break:break-all">エラー: ' + err.message + '</span>';
  }
}

// ===== ステップ表示 =====

function showStep(name) {
  document.querySelectorAll('[data-step]').forEach(el => el.classList.remove('active'));
  document.querySelector('[data-step="' + name + '"]').classList.add('active');

  const indicator = document.getElementById('stepIndicator');
  const titles = {
    loading: '注文フォーム',
    register: 'お客様情報の登録',
    order: '商品を選ぶ',
    confirm: '注文確認',
  };
  document.getElementById('headerTitle').textContent = titles[name] || '注文フォーム';

  const totalBar = document.getElementById('totalBar');
  if (name === 'order') {
    indicator.style.display = 'flex';
    totalBar.style.display = 'flex';
    setStepActive(2);
  } else if (name === 'confirm') {
    indicator.style.display = 'flex';
    totalBar.style.display = 'none';
    setStepActive(3);
  } else if (name === 'register') {
    indicator.style.display = 'flex';
    totalBar.style.display = 'none';
    setStepActive(1);
  } else {
    indicator.style.display = 'none';
    totalBar.style.display = 'none';
  }

  window.scrollTo(0, 0);
}

function setStepActive(n) {
  for (let i = 1; i <= 3; i++) {
    const el = document.getElementById('si' + i);
    el.classList.remove('active', 'done');
    if (i < n) el.classList.add('done');
    else if (i === n) el.classList.add('active');
  }
  // ステップラインの色
  document.querySelectorAll('.step-line').forEach((line, i) => {
    line.style.background = (i + 1 < n) ? 'var(--green)' : 'var(--border)';
  });
}

// ===== 郵便番号検索 =====

async function lookupPostal() {
  const postal = document.getElementById('r_postal').value.replace(/-/g, '');
  if (postal.length !== 7) { alert('郵便番号は7桁で入力してください'); return; }

  try {
    const res = await fetch('https://zipcloud.ibsnet.co.jp/api/search?zipcode=' + postal);
    const json = await res.json();
    if (json.results) {
      const r = json.results[0];
      registrationPrefecture = r.address1;
      document.getElementById('r_address').value = r.address1 + r.address2 + r.address3;
    } else {
      alert('住所が見つかりませんでした');
    }
  } catch {
    alert('住所検索に失敗しました');
  }
}

async function submitRegistration() {
  const name    = document.getElementById('r_name').value.trim();
  const postal  = document.getElementById('r_postal').value.trim();
  const address = document.getElementById('r_address').value.trim() + document.getElementById('r_address2').value.trim();
  const phone   = document.getElementById('r_phone').value.trim();
  const email   = document.getElementById('r_email').value.trim();

  const errEl = document.getElementById('registerError');
  errEl.style.display = 'none';

  if (!name || !postal || !address || !phone || !email) {
    errEl.textContent = '必須項目をすべて入力してください';
    errEl.style.display = 'block';
    return;
  }
  if (!/^\S+@\S+\.\S+$/.test(email)) {
    errEl.textContent = 'メールアドレスの形式が正しくありません';
    errEl.style.display = 'block';
    return;
  }

  const btn = event.target;
  btn.disabled = true;
  btn.textContent = '登録中...';

  try {
    const res = await api('registerUser', {
      lineId: lineProfile.userId,
      name, postalCode: postal, address, phone, email,
    });
    if (!res.success) throw new Error(res.error);

    const pref = registrationPrefecture || extractPrefecture(document.getElementById('r_address').value);
    userData = { name, email, address, phone, prefecture: pref };
    await loadProducts();
    showStep('order');
  } catch (err) {
    errEl.textContent = 'エラー: ' + err.message;
    errEl.style.display = 'block';
  } finally {
    btn.disabled = false;
    btn.textContent = '次へ：商品を選ぶ';
  }
}

// ===== 送料計算 =====
// [サイズ][ゾーン: 0=標準, 1=北海道, 2=北東北, 3=沖縄]
const SHIPPING_TABLE = [
  [0,  650, 250,  650],  // ≤2kg
  [0,  800, 400, 1100],  // ≤5kg
  [0,  900, 500, 1500],  // ≤10kg
  [0,  950, 600, 1900],  // ≤15kg
  [0, 1000, 600, 2200],  // ≤20kg
  [0, 1000, 600, 2500],  // ≤25kg
  [0, 1000, 600, 2800],  // ≤30kg
  [0, 1000, 600, 3300],  // >30kg
];
const WEIGHT_LIMITS = [2, 5, 10, 15, 20, 25, 30, Infinity];

function extractPrefecture(addr) {
  const str = (addr || '').replace(/^\d[\d-]*\s*/, '');
  const m = str.match(/^(北海道|東京都|大阪府|京都府|[^\s]{2,3}[都道府県])/);
  return m ? m[1] : '';
}

function getShippingZone(pref) {
  if (pref === '北海道') return 1;
  if (['青森県','岩手県','秋田県'].indexOf(pref) >= 0) return 2;
  if (pref === '沖縄県') return 3;
  return 0;
}

function getProductWeightKg(name) {
  const m = name.match(/（(\d+)kg）/);
  return m ? parseInt(m[1], 10) : 0;
}

function calcShipping(items, prefecture) {
  const zone = getShippingZone(prefecture || '');
  if (zone === 0) return 0;
  const totalKg = items.reduce(function(sum, item) {
    return sum + getProductWeightKg(item.name) * item.quantity;
  }, 0);
  let idx = 0;
  for (let i = 0; i < WEIGHT_LIMITS.length; i++) {
    if (totalKg <= WEIGHT_LIMITS[i]) { idx = i; break; }
    idx = WEIGHT_LIMITS.length - 1;
  }
  return SHIPPING_TABLE[idx][zone];
}

function selectTime(el, time) {
  document.querySelectorAll('.time-slot').forEach(b => b.classList.remove('selected'));
  el.classList.add('selected');
  selectedTime = time;
}

function setScheduleType(type) {
  scheduleType = type;
  document.getElementById('btnSingle').classList.toggle('active', type === 'single');
  document.getElementById('btnRepeat').classList.toggle('active', type === 'repeat');
  document.getElementById('singleSchedule').style.display = type === 'single' ? '' : 'none';
  document.getElementById('repeatSchedule').style.display = type === 'repeat' ? '' : 'none';
}

function toggleWeekday(el) {
  const day = parseInt(el.getAttribute('data-day'), 10);
  el.classList.toggle('selected');
  if (el.classList.contains('selected')) {
    if (!selectedWeekdays.includes(day)) selectedWeekdays.push(day);
  } else {
    selectedWeekdays = selectedWeekdays.filter(d => d !== day);
  }
  updateDatePreview();
}

function localDateStr(d) {
  return d.getFullYear() + '-' +
    String(d.getMonth() + 1).padStart(2, '0') + '-' +
    String(d.getDate()).padStart(2, '0');
}

function calcDeliveryDates(start, end, weekdays) {
  const dates = [];
  const cur = new Date(start + 'T00:00:00');
  const endDate = new Date(end + 'T00:00:00');
  while (cur <= endDate && dates.length <= 60) {
    if (weekdays.includes(cur.getDay())) dates.push(localDateStr(cur));
    cur.setDate(cur.getDate() + 1);
  }
  return dates;
}

function fmtDate(dateStr) {
  const d = new Date(dateStr + 'T00:00:00');
  const days = ['日','月','火','水','木','金','土'];
  return (d.getMonth() + 1) + '/' + d.getDate() + '(' + days[d.getDay()] + ')';
}

function updateDatePreview() {
  const start = document.getElementById('repeatStart').value;
  const end = document.getElementById('repeatEnd').value;
  const preview = document.getElementById('datePreview');
  if (!start || !end || start > end || selectedWeekdays.length === 0) {
    preview.style.display = 'none';
    return;
  }
  const dates = calcDeliveryDates(start, end, selectedWeekdays);
  if (dates.length === 0) { preview.style.display = 'none'; return; }
  document.getElementById('datePreviewList').innerHTML =
    dates.map(function(d) { return '<span class="date-chip">' + fmtDate(d) + '</span>'; }).join('');
  document.getElementById('datePreviewCount').textContent = '計 ' + dates.length + '回の配達';
  preview.style.display = '';
}

async function loadProducts() {
  const res = await api('getProducts', {});
  if (!res.success) throw new Error(res.error);
  products = res.products;
  quantities = {};
  selectedTime = '';
  products.forEach(p => { quantities[p.id] = 0; });

  // スケジュールリセット
  scheduleType = 'single';
  selectedWeekdays = [];
  deliveryDates = [];
  setScheduleType('single');
  document.querySelectorAll('.wday-btn').forEach(b => b.classList.remove('selected'));
  document.querySelectorAll('.time-slot').forEach(b => b.classList.remove('selected'));
  document.getElementById('datePreview').style.display = 'none';

  // 最短配達日（APIから取得、デフォルト今日+4日）
  const _minFallback = new Date();
  _minFallback.setDate(_minFallback.getDate() + 4);
  window._minDeliveryDate = res.minDeliveryDate || localDateStr(_minFallback);
  const minDate = window._minDeliveryDate;
  ['deliveryDate','repeatStart','repeatEnd'].forEach(function(id) {
    const el = document.getElementById(id);
    el.min = minDate;
    el.value = '';
    el.onchange = function() {
      if (this.value && this.value < minDate) this.value = minDate;
    };
  });

  renderProducts();
}

function renderProducts() {
  const list = document.getElementById('productList');
  // グループ別に整理
  const groupMap = {};
  const groupOrder = [];
  products.forEach(function(p) {
    const g = p.group || 'その他';
    if (!groupMap[g]) { groupMap[g] = []; groupOrder.push(g); }
    groupMap[g].push(p);
  });

  let html = '';
  groupOrder.forEach(function(g, gi) {
    const gid = 'grp-' + gi;
    html += '<div class="product-group-header" id="hdr-' + gid + '" onclick="toggleGroup(\'' + gid + '\')">' +
      '<span>' + g + '</span><span class="group-arrow">▼</span></div>';
    html += '<div class="product-group-body" id="' + gid + '">';
    groupMap[g].forEach(function(p) {
      const soldOut = p.stock <= 0;
      const dis = soldOut ? ' disabled' : '';
      html += '<div class="product-item' + (soldOut ? ' sold-out' : '') + '" id="pi-' + p.id + '">' +
        '<div class="product-info">' +
          '<div class="product-name">' + p.name + '</div>' +
          '<div class="product-price">¥' + p.price.toLocaleString() + ' / ' + p.unit +
            (soldOut ? '<span class="sold-out-badge">在庫なし</span>' : '') + '</div>' +
        '</div>' +
        '<div class="qty-control">' +
          '<button class="qty-btn"' + dis + ' onclick="changeQty(\'' + p.id + '\', -1)">−</button>' +
          '<div class="qty-num" id="qty-' + p.id + '">0</div>' +
          '<button class="qty-btn plus"' + dis + ' onclick="changeQty(\'' + p.id + '\', 1)">＋</button>' +
        '</div>' +
      '</div>';
    });
    html += '</div>';
  });
  list.innerHTML = html;

  // 初期の高さをセット
  document.querySelectorAll('.product-group-body').forEach(function(el) {
    el.style.maxHeight = el.scrollHeight + 'px';
  });
  updateTotal();
}

function toggleGroup(gid) {
  const body = document.getElementById(gid);
  const hdr = document.getElementById('hdr-' + gid);
  const isOpen = !body.classList.contains('closed');
  if (isOpen) {
    body.style.maxHeight = body.scrollHeight + 'px';
    requestAnimationFrame(function() { body.classList.add('closed'); });
  } else {
    body.classList.remove('closed');
    body.style.maxHeight = body.scrollHeight + 'px';
  }
  hdr.classList.toggle('closed', isOpen);
}

function changeQty(id, delta) {
  const p = products.find(function(x) { return x.id === id; });
  const maxQty = p ? p.stock : 999;
  quantities[id] = Math.max(0, Math.min(maxQty, (quantities[id] || 0) + delta));
  document.getElementById('qty-' + id).textContent = quantities[id];
  document.getElementById('pi-' + id).classList.toggle('selected', quantities[id] > 0);
  updateTotal();
}

function updateTotal() {
  const total = products.reduce((sum, p) => sum + p.price * (quantities[p.id] || 0), 0);
  document.getElementById('totalAmount').textContent = '¥' + total.toLocaleString();

  const hasItems = total > 0;
  document.querySelector('#totalBar .btn-primary').disabled = !hasItems;
}

// ===== 注文確認 =====

function goToConfirm() {
  const items = products.filter(p => quantities[p.id] > 0).map(p => ({
    id: p.id, name: p.name, price: p.price, unit: p.unit, quantity: quantities[p.id],
  }));
  if (items.length === 0) { alert('商品を選択してください'); return; }

  // 配達日確定
  const _min = window._minDeliveryDate || '';
  if (scheduleType === 'single') {
    const d = document.getElementById('deliveryDate').value;
    if (!d) { alert('配達希望日を選択してください'); return; }
    if (_min && d < _min) { alert('配達希望日は ' + fmtDate(_min) + ' 以降を選択してください'); return; }
    deliveryDates = [d];
  } else {
    const start = document.getElementById('repeatStart').value;
    const end = document.getElementById('repeatEnd').value;
    if (!start || !end) { alert('開始日と終了日を選択してください'); return; }
    if (_min && start < _min) { alert('開始日は ' + fmtDate(_min) + ' 以降を選択してください'); return; }
    if (selectedWeekdays.length === 0) { alert('曜日を選択してください'); return; }
    deliveryDates = calcDeliveryDates(start, end, selectedWeekdays);
    if (deliveryDates.length === 0) { alert('選択した期間・曜日に配達日がありません'); return; }
  }
  if (!selectedTime) { alert('時間帯を選択してください'); return; }

  const perDelivery = items.reduce((sum, i) => sum + i.price * i.quantity, 0);
  const shippingPerDelivery = calcShipping(items, userData.prefecture || '');
  currentShipping = shippingPerDelivery * deliveryDates.length;
  const total = (perDelivery + shippingPerDelivery) * deliveryDates.length;

  // 注文内容
  const summaryEl = document.getElementById('orderSummary');
  const repeatNote = deliveryDates.length > 1 ? '（1回分）' : '';
  const prefLabel = userData.prefecture ? '（' + userData.prefecture + '）' : '';
  summaryEl.innerHTML = items.map(function(i) {
    return '<div class="order-row">' +
      '<span>' + i.name + ' × ' + i.quantity + i.unit + repeatNote + '</span>' +
      '<span>¥' + (i.price * i.quantity).toLocaleString() + '</span>' +
    '</div>';
  }).join('') +
  (shippingPerDelivery > 0 ?
    '<div class="order-row"><span>送料' + prefLabel + repeatNote + '</span><span>¥' + shippingPerDelivery.toLocaleString() + '</span></div>' : '') +
  (deliveryDates.length > 1 ?
    '<div class="order-row"><span style="color:var(--sub);font-size:13px">× ' + deliveryDates.length + '回分</span><span></span></div>' : '') +
    '<div class="order-row total"><span>合計</span><span>¥' + total.toLocaleString() + '</span></div>';

  // スケジュール表示
  let scheduleLabel;
  if (deliveryDates.length === 1) {
    scheduleLabel = fmtDate(deliveryDates[0]);
  } else {
    scheduleLabel = deliveryDates.map(fmtDate).join('　') + '<br>計' + deliveryDates.length + '回';
  }

  // お届け先
  document.getElementById('userInfoSummary').innerHTML =
    '<b>' + userData.name + '</b><br>' + (userData.address || '') + '<br>' + (userData.phone || '') + '<br>' + userData.email +
    '<br><br><b>配達希望：</b>' + scheduleLabel + '<br>' + selectedTime;

  showStep('confirm');
}

function goBack() {
  showStep('order');
}

// ===== 注文送信 =====

async function submitOrder() {
  const items = products.filter(p => quantities[p.id] > 0).map(p => ({
    id: p.id, name: p.name, price: p.price, quantity: quantities[p.id],
  }));

  const btn = document.getElementById('payBtn');
  btn.disabled = true;
  btn.textContent = '処理中...';

  const errEl = document.getElementById('confirmError');
  errEl.style.display = 'none';

  try {
    const res = await api('createOrder', {
      lineId: lineProfile.userId,
      userName: userData.name,
      email: userData.email,
      items,
      deliveryDates: deliveryDates,
      deliveryTime: selectedTime,
      shipping: currentShipping,
    });
    if (!res.success) throw new Error(res.error);

    // Stripe決済ページへ遷移
    liff.openWindow({ url: res.checkoutUrl, external: true });

  } catch (err) {
    errEl.textContent = 'エラー: ' + err.message;
    errEl.style.display = 'block';
    btn.disabled = false;
    btn.textContent = 'Stripeで決済する';
  }
}

// ===== APIコール =====

async function api(action, data) {
  const params = new URLSearchParams({
    action,
    payload: JSON.stringify(data || {}),
  });
  const res = await fetch(API_URL + '?' + params.toString());
  if (!res.ok) throw new Error('通信エラー (' + res.status + ')');
  return res.json();
}
